<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cinema - Menú Principal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card-menu {
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            cursor: pointer;
        }
        .card-menu:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2) !important;
        }
        .icon-box {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center text-center text-white mb-5">
        <div class="col-md-8">
            <h1 class="display-3 fw-bold">🍿 Cinema Sakila</h1>
            <p class="lead">Gestió de la base de dades de la plataforma cinematogràfica</p>
        </div>
    </div>

    <div class="row g-4 justify-content-center">
        
        <div class="col-md-4 col-lg-3">
            <a th:href="@{/actors}">
                <div class="card card-menu h-100 shadow-sm text-center p-4">
                    <div class="card-body">
                        <div class="icon-box text-primary">
                            <i class="bi bi-people-fill"></i>
                        </div>
                        <h4 class="card-title text-dark">Actors</h4>
                        <p class="card-text text-muted">Gestió d'intèrprets i noves altes.</p>
                        <span class="btn btn-primary w-100">Entrar</span>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-4 col-lg-3">
            <a th:href="@{/paisos}">
                <div class="card card-menu h-100 shadow-sm text-center p-4">
                    <div class="card-body">
                        <div class="icon-box text-success">
                            <i class="bi bi-globe-americas"></i>
                        </div>
                        <h4 class="card-title text-dark">Països</h4>
                        <p class="card-text text-muted">Llistat de localitzacions mundials.</p>
                        <span class="btn btn-success w-100">Entrar</span>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-4 col-lg-3">
            <a th:href="@{/pelis}">
                <div class="card card-menu h-100 shadow-sm text-center p-4">
                    <div class="card-body">
                        <div class="icon-box text-warning">
                            <i class="bi bi-film"></i>
                        </div>
                        <h4 class="card-title text-dark">Pel·lícules</h4>
                        <p class="card-text text-muted">Catàleg complet de títols i detalls.</p>
                        <span class="btn btn-warning w-100">Entrar</span>
                    </div>
                </div>
            </a>
        </div>

    </div>

    <div class="row mt-5 text-center text-white-50">
        <p><small>Projecte CI/CD amb Jenkins, SonarQube i Docker</small></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
