<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Actors - Cinema Sakila</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body {
            /* Mateix gradient que a l'index per mantenir la identitat visual */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .main-container {
            padding-top: 40px;
            padding-bottom: 60px;
        }
        .table-container {
            background: rgba(255, 255, 255, 0.95); /* Blanc quasi opac per llegir bé la taula */
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card-custom {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .header-section {
            color: white;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container main-container">
    
    <div class="header-section d-flex justify-content-between align-items-center">
        <div>
            <h1 class="display-5 fw-bold"><i class="bi bi-people-fill"></i> Actors</h1>
            <p class="lead mb-0">Gestió del llistat oficial d'intèrprets</p>
        </div>
        <a th:href="@{/}" class="btn btn-light btn-lg shadow-sm">
            <i class="bi bi-house-door-fill"></i> Menú Principal
        </a>
    </div>

    <div th:if="${missatge}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${missatge}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <strong>Error:</strong> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card card-custom mb-5 overflow-hidden">
        <div class="card-header bg-dark text-white py-3">
            <h5 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i> Afegir nou registre</h5>
        </div>
        <div class="card-body bg-light p-4">
            <form th:action="@{/actors/add}" method="post" class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label for="nom" class="form-label fw-bold">Nom</label>
                    <input type="text" id="nom" name="first_name" class="form-control form-control-lg" 
                           required placeholder="Ex: Harrison">
                </div>
                <div class="col-md-5">
                    <label for="cognoms" class="form-label fw-bold">Cognoms</label>
                    <input type="text" id="cognoms" name="last_name" class="form-control form-control-lg" 
                           required placeholder="Ex: Ford">
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary btn-lg shadow">
                        <i class="bi bi-plus-circle"></i> Afegir
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table th:if="${actors}" class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="py-3 text-center" style="width: 80px;">ID</th>
                        <th class="py-3">Nom de l'Actor</th>
                        <th class="py-3 text-end">Última Actualització</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${actors}">
                        <td class="text-center fw-bold text-primary" th:text="${p.id()}"></td>
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="avatar-circle me-3 bg-secondary text-white d-flex align-items-center justify-content-center rounded-circle" 
                                     style="width: 35px; height: 35px; font-size: 0.8rem;">
                                    <span th:text="${#strings.substring(p.nom(),0,1)}"></span>
                                </div>
                                <div>
                                    <span class="fw-bold text-uppercase" th:text="${p.nom()}"></span>
                                    <span class="text-dark" th:text="${p.cognoms()}"></span>
                                </div>
                            </div>
                        </td>
                        <td class="text-end text-muted small">
                            <i class="bi bi-calendar3 me-1"></i> <span th:text="${p.lastUpdate()}"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
