<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Països - Cinema Sakila</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .main-container { padding-top: 40px; padding-bottom: 60px; }
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .header-section { color: white; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container main-container">
    
    <div class="header-section d-flex justify-content-between align-items-center">
        <div>
            <h1 class="display-5 fw-bold"><i class="bi bi-globe-americas"></i> Països</h1>
            <p class="lead mb-0">Gestió de localitzacions geogràfiques</p>
        </div>
        <a th:href="@{/}" class="btn btn-light btn-lg shadow-sm">
            <i class="bi bi-house-door-fill"></i> Menú Principal
        </a>
    </div>

    <div th:if="${missatge}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${missatge}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <strong>Error:</strong> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card card-custom mb-5 overflow-hidden">
        <div class="card-header bg-success text-white py-3">
            <h5 class="mb-0"><i class="bi bi-plus-square-fill me-2"></i> Registrar Nou País</h5>
        </div>
        <div class="card-body bg-light p-4">
            <form th:action="@{/paisos/add}" method="post" class="row g-3 align-items-end">
                <div class="col-md-9">
                    <label for="country" class="form-label fw-bold">Nom del País</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-flag"></i></span>
                        <input type="text" id="country" name="country_name" class="form-control form-control-lg" 
                               required placeholder="Ex: Itàlia, Japó, Mèxic...">
                    </div>
                </div>
                <div class="col-md-3 d-grid">
                    <button type="submit" class="btn btn-success btn-lg shadow">
                        <i class="bi bi-cloud-upload"></i> Guardar País
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table th:if="${paisos}" class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="py-3 text-center" style="width: 100px;">ID</th>
                        <th class="py-3">Nom del País</th>
                        <th class="py-3 text-end">Última Actualització</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${paisos}">
                        <td class="text-center fw-bold text-success" th:text="${p.id()}"></td>
                        <td>
                            <div class="d-flex align-items-center text-uppercase fw-bold">
                                <i class="bi bi-geo-alt-fill text-danger me-2"></i>
                                <span th:text="${p.nom()}"></span>
                            </div>
                        </td>
                        <td class="text-end text-muted small">
                            <i class="bi bi-clock-history me-1"></i> <span th:text="${p.lastUpdate()}"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:unless="${paisos}" class="text-center p-5 text-muted">
                <i class="bi bi-search display-1"></i>
                <p class="mt-3">No s'ha trobat cap país a la base de dades.</p>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
