<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pel·lícules - Cinema Sakila</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .main-container { padding-top: 40px; padding-bottom: 60px; }
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .header-section { color: white; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .text-description { font-size: 0.9rem; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container main-container">
    
    <div class="header-section d-flex justify-content-between align-items-center">
        <div>
            <h1 class="display-5 fw-bold"><i class="bi bi-film"></i> Pel·lícules</h1>
            <p class="lead mb-0">Catàleg complet de produccions cinematogràfiques</p>
        </div>
        <a th:href="@{/}" class="btn btn-light btn-lg shadow-sm">
            <i class="bi bi-house-door-fill"></i> Menú Principal
        </a>
    </div>

    <div th:if="${missatge}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${missatge}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <strong>Error:</strong> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card card-custom mb-5 overflow-hidden">
        <div class="card-header bg-warning text-dark py-3 fw-bold">
            <h5 class="mb-0"><i class="bi bi-plus-circle-fill me-2"></i> Nova Pel·lícula</h5>
        </div>
        <div class="card-body bg-light p-4">
            <form th:action="@{/pelis/add}" method="post" class="row g-3">
                <div class="col-md-8">
                    <label for="title" class="form-label fw-bold">Títol</label>
                    <input type="text" id="title" name="title" class="form-control" 
                           required placeholder="Ex: Inception">
                </div>
                <div class="col-md-4">
                    <label for="release_year" class="form-label fw-bold">Any de llançament</label>
                    <input type="number" id="release_year" name="release_year" class="form-control" 
                           min="1900" max="2100" th:value="${#calendars.format(#calendars.createNow(), 'yyyy')}">
                </div>
                <div class="col-12">
                    <label for="description" class="form-label fw-bold">Descripció</label>
                    <textarea id="description" name="description" class="form-control" rows="2" 
                              placeholder="Breu resum de la trama..."></textarea>
                </div>
                <div class="col-12 d-grid">
                    <button type="submit" class="btn btn-warning btn-lg shadow fw-bold">
                        <i class="bi bi-save"></i> Registrar Pel·lícula
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table th:if="${pelis}" class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center" style="width: 80px;">ID</th>
                        <th style="width: 250px;">Títol</th>
                        <th>Descripció</th>
                        <th class="text-center" style="width: 120px;">Llançament</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${pelis}">
                        <td class="text-center fw-bold text-muted" th:text="${p.id()}"></td>
                        <td>
                            <div class="fw-bold text-uppercase text-primary" th:text="${p.titol()}"></div>
                        </td>
                        <td class="text-description" th:text="${p.descripcio()}"></td>
                        <td class="text-center">
                            <span class="badge bg-secondary rounded-pill p-2 px-3" th:text="${p.anyLlancament()}"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:unless="${pelis}" class="text-center p-5 text-muted">
                <i class="bi bi-film display-1"></i>
                <p class="mt-3">No hi ha pel·lícules al catàleg.</p>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
